# Nightly Monkey Test — runs scripts/monkey-search.mjs against prod every
# day at 03:00 UTC (off-peak for UK customers). Failures fingerprint into
# the KV Bug Inbox via /api/bug-monitor; non-zero exit fails the workflow
# so GitHub also surfaces the regression in the Actions tab.
#
# Required repo secret:
#   BUG_MONITOR_SECRET  — same value as the Vercel env var.
#
# Manual trigger (handy for ad-hoc verification):
#   gh workflow run monkey-nightly.yml
name: monkey-nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of randomised searches'
        required: false
        default: '50'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run search monkey (Stage 1 — fuzz hotel search)
        env:
          BASE: https://jetmeaway.co.uk
          COUNT: ${{ github.event.inputs.count || '50' }}
          BUG_MONITOR_SECRET: ${{ secrets.BUG_MONITOR_SECRET }}
        run: node scripts/monkey-search.mjs

      # Stage 2 — booking-funnel + URL-builder + route-health probe.
      # Lower COUNT because each run writes to KV (4h TTL); 10 daily is
      # enough signal without polluting the prod store.
      - name: Run audit monkey (Stage 2 — booking funnel + routes)
        if: always()  # run even if Stage 1 failed — they cover different ground
        env:
          BASE: https://jetmeaway.co.uk
          COUNT: '10'
          BUG_MONITOR_SECRET: ${{ secrets.BUG_MONITOR_SECRET }}
        run: node scripts/monkey-audit.mjs

      # Stage 4 — supplier health probe. Calls /api/admin/supplier-health
      # which proxies a tiny auth-required call to LiteAPI / Duffel /
      # Travelpayouts. Detects supplier outages independently of our own
      # routes (those can pass while a supplier is down, when results
      # come from KV cache).
      - name: Run supplier-health probe (Stage 4)
        if: always()
        env:
          BASE: https://jetmeaway.co.uk
          BUG_MONITOR_SECRET: ${{ secrets.BUG_MONITOR_SECRET }}
        run: node scripts/supplier-health.mjs

      # Stage 5 — a11y audit. JSDom + axe-core static scan against every
      # public route. Needs node_modules so we install first; cached by
      # actions/setup-node when the lockfile hash matches.
      - name: Install deps for a11y scan
        if: always()
        run: npm ci --no-audit --no-fund
      - name: Run a11y audit (Stage 5)
        if: always()
        env:
          BASE: https://jetmeaway.co.uk
          BUG_MONITOR_SECRET: ${{ secrets.BUG_MONITOR_SECRET }}
        run: node scripts/a11y-audit.mjs
