<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1230"/>
      <stop offset="55%" stop-color="#0F1B4A"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.2" r="0.9">
      <stop offset="0%" stop-color="#3A7BFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0A1230" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#glow)"/>

  <!-- faint street grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 100 L1024 100"/><path d="M0 200 L1024 200"/><path d="M0 300 L1024 300"/><path d="M0 400 L1024 400"/>
    <path d="M100 0 L100 500"/><path d="M220 0 L220 500"/><path d="M340 0 L340 500"/><path d="M460 0 L460 500"/>
    <path d="M580 0 L580 500"/><path d="M700 0 L700 500"/><path d="M820 0 L820 500"/><path d="M940 0 L940 500"/>
  </g>

  <!-- diagonal main road -->
  <path d="M-40 380 Q 300 200 600 220 T 1080 90" stroke="#3A7BFF" stroke-opacity="0.4" stroke-width="3" fill="none"/>

  <!-- pins -->
  <circle cx="180" cy="320" r="5" fill="#00D0A4"/><circle cx="180" cy="320" r="14" fill="#00D0A4" fill-opacity="0.25"/>
  <circle cx="360" cy="240" r="5" fill="#FFB547"/><circle cx="360" cy="240" r="14" fill="#FFB547" fill-opacity="0.25"/>
  <circle cx="520" cy="140" r="5" fill="#FF5470"/><circle cx="520" cy="140" r="14" fill="#FF5470" fill-opacity="0.25"/>

  <!-- headline -->
  <g font-family="Poppins, system-ui, sans-serif" fill="#FFFFFF">
    <text x="64" y="170" font-size="22" font-weight="700" fill="#7FB2FF" letter-spacing="4">JETMEAWAY · SCOUT</text>
    <text x="64" y="260" font-size="64" font-weight="900" letter-spacing="-2">Life, not just</text>
    <text x="64" y="330" font-size="64" font-weight="900" letter-spacing="-2" fill="#7FB2FF">lodging.</text>
    <text x="64" y="395" font-size="20" font-weight="600" fill="#C7D5F5">Your personal travel scout for every city.</text>
  </g>

  <!-- phone silhouette -->
  <g transform="translate(760 70)">
    <rect x="0" y="0" width="210" height="370" rx="30" fill="#0F1119"/>
    <rect x="8" y="8" width="194" height="354" rx="24" fill="#FFFFFF"/>
    <text x="105" y="50" font-family="Poppins" font-size="9" font-weight="700" fill="#0066FF" text-anchor="middle" letter-spacing="1.5">SCOUT · LISBON</text>
    <text x="105" y="78" font-family="Poppins" font-size="16" font-weight="900" fill="#1A1D2B" text-anchor="middle">Príncipe Real</text>
    <rect x="16" y="100" width="178" height="52" rx="10" fill="#F8FAFC"/>
    <text x="28" y="122" font-family="Poppins" font-size="8" font-weight="700" fill="#0066FF" letter-spacing="1.2">MORNING RITUAL</text>
    <text x="28" y="140" font-family="Poppins" font-size="10" font-weight="800" fill="#1A1D2B">Hello, Kristof · 06:30</text>
    <rect x="16" y="160" width="178" height="52" rx="10" fill="#F8FAFC"/>
    <text x="28" y="182" font-family="Poppins" font-size="8" font-weight="700" fill="#00A86B" letter-spacing="1.2">FITNESS ECOSYSTEM</text>
    <text x="28" y="200" font-family="Poppins" font-size="10" font-weight="800" fill="#1A1D2B">CrossFit LX · 4 min</text>
    <rect x="16" y="220" width="178" height="52" rx="10" fill="#F8FAFC"/>
    <text x="28" y="242" font-family="Poppins" font-size="8" font-weight="700" fill="#3A7BFF" letter-spacing="1.2">WELLNESS LAYER</text>
    <text x="28" y="260" font-family="Poppins" font-size="10" font-weight="800" fill="#1A1D2B">Organic grocer · 2 min</text>
    <rect x="16" y="298" width="178" height="34" rx="9" fill="#0066FF"/>
    <text x="105" y="321" font-family="Poppins" font-size="11" font-weight="900" fill="#FFFFFF" text-anchor="middle">Book this neighbourhood</text>
  </g>
</svg>
