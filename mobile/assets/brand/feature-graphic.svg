<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1230"/>
      <stop offset="55%" stop-color="#0A3B8A"/>
      <stop offset="100%" stop-color="#1458B5"/>
    </linearGradient>
    <linearGradient id="circle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A7BD8"/>
      <stop offset="60%" stop-color="#1458B5"/>
      <stop offset="100%" stop-color="#0A3B8A"/>
    </linearGradient>
    <linearGradient id="swoosh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F9B437"/>
      <stop offset="50%" stop-color="#F58220"/>
      <stop offset="100%" stop-color="#D95F0B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.2" r="0.9">
      <stop offset="0%" stop-color="#3A7BFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0A1230" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#glow)"/>

  <!-- faint street grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 100 L1024 100"/><path d="M0 200 L1024 200"/><path d="M0 300 L1024 300"/><path d="M0 400 L1024 400"/>
  </g>

  <!-- Brand mark (top-left of headline) -->
  <g transform="translate(110 140)">
    <circle cx="0" cy="0" r="54" fill="url(#circle)" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2"/>
    <path d="M -36 12 Q 0 25 36 4"
          stroke="url(#swoosh)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <g transform="rotate(-35)">
      <path d="M -18 14 L 26 -18 L 10 4 Z" fill="#FFFFFF"/>
      <path d="M 10 4 L 26 -18 L 18 20 Z" fill="#C7D5F5"/>
    </g>
  </g>

  <!-- Headline -->
  <g font-family="Poppins, system-ui, sans-serif" fill="#FFFFFF">
    <text x="190" y="150" font-size="24" font-weight="700" fill="#F9B437" letter-spacing="3">JETMEAWAY · SCOUT</text>
    <text x="64" y="260" font-size="60" font-weight="900" letter-spacing="-2">Life, not just</text>
    <text x="64" y="325" font-size="60" font-weight="900" letter-spacing="-2" fill="#F9B437">lodging.</text>
    <text x="64" y="390" font-size="18" font-weight="600" fill="#C7D5F5">Your personal travel scout for every city.</text>
  </g>

  <!-- phone silhouette on the right -->
  <g transform="translate(760 70)">
    <rect x="0" y="0" width="210" height="370" rx="30" fill="#0F1119"/>
    <rect x="8" y="8" width="194" height="354" rx="24" fill="#FFFFFF"/>
    <text x="105" y="50" font-family="Poppins" font-size="9" font-weight="700" fill="#1458B5" text-anchor="middle" letter-spacing="1.5">SCOUT · LISBON</text>
    <text x="105" y="78" font-family="Poppins" font-size="16" font-weight="900" fill="#1A1D2B" text-anchor="middle">Príncipe Real</text>
    <rect x="16" y="100" width="178" height="52" rx="10" fill="#F8FAFC"/>
    <text x="28" y="122" font-family="Poppins" font-size="8" font-weight="700" fill="#F58220" letter-spacing="1.2">MORNING RITUAL</text>
    <text x="28" y="140" font-family="Poppins" font-size="10" font-weight="800" fill="#1A1D2B">Hello, Kristof · 06:30</text>
    <rect x="16" y="160" width="178" height="52" rx="10" fill="#F8FAFC"/>
    <text x="28" y="182" font-family="Poppins" font-size="8" font-weight="700" fill="#00A86B" letter-spacing="1.2">FITNESS ECOSYSTEM</text>
    <text x="28" y="200" font-family="Poppins" font-size="10" font-weight="800" fill="#1A1D2B">CrossFit LX · 4 min</text>
    <rect x="16" y="220" width="178" height="52" rx="10" fill="#F8FAFC"/>
    <text x="28" y="242" font-family="Poppins" font-size="8" font-weight="700" fill="#1458B5" letter-spacing="1.2">WELLNESS LAYER</text>
    <text x="28" y="260" font-family="Poppins" font-size="10" font-weight="800" fill="#1A1D2B">Organic grocer · 2 min</text>
    <rect x="16" y="298" width="178" height="34" rx="9" fill="#1458B5"/>
    <text x="105" y="321" font-family="Poppins" font-size="11" font-weight="900" fill="#FFFFFF" text-anchor="middle">Book this neighbourhood</text>
  </g>
</svg>
