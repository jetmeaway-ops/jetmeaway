<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400">
  <!--
    JetMeAway canonical HORIZONTAL LOCKUP — 2026-04-21.
    Icon mark on the left + "Jetmeaway" wordmark on the right. For web
    headers, letterheads, footers, press kits, social-media banners.

    NOT used for app icons — the square icon variants
    (icon-canonical.svg / icon-canonical-foreground.svg) handle those.

    Wordmark spelling: "Jetmeaway" (lowercase m) per the 2026-04-21 user
    brand decision. The Play Store listing title still reads
    "JetMeAway — Life, Not Lodging" (camel case) — that discrepancy is
    logged in MOBILE_LOG.md as a separate decision for later. The
    wordmark here preserves the lowercase-m form shown in the reference
    lockup the user approved.

    Uses system sans-serif with bold italic weight as a placeholder for
    the final typeface. Replace `font-family` with the brand font once
    it's licensed.
  -->
  <defs>
    <clipPath id="wm-circle-clip">
      <circle cx="200" cy="200" r="180"/>
    </clipPath>

    <linearGradient id="wm-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1F6BD2"/>
      <stop offset="55%"  stop-color="#1458B5"/>
      <stop offset="100%" stop-color="#0A3B8A"/>
    </linearGradient>

    <linearGradient id="wm-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FCD15A"/>
      <stop offset="55%"  stop-color="#F5B820"/>
      <stop offset="100%" stop-color="#D99A0E"/>
    </linearGradient>

    <radialGradient id="wm-sheen" cx="0.28" cy="0.22" r="0.7">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Icon mark scaled down to 360×360 at (20..380, 20..380) -->
  <g>
    <g clip-path="url(#wm-circle-clip)">
      <rect x="20" y="20" width="360" height="360" fill="url(#wm-blue)"/>
      <!-- Gold polygon: original was (0,0)(430,0)(370,1024)(0,1024) on a 1024 canvas.
           Scale by 360/1024 = 0.3516 and offset by (20,20).
           0 → 20   ;   430*0.3516+20 = 171 ;   370*0.3516+20 = 150 ; 1024*0.3516+20 = 380 -->
      <polygon points="20,20 171,20 150,380 20,380" fill="url(#wm-gold)"/>
      <rect x="20" y="20" width="360" height="360" fill="url(#wm-sheen)"/>
    </g>
    <circle cx="200" cy="200" r="180" fill="none" stroke="#0A3B8A" stroke-width="1.5" stroke-opacity="0.25"/>

    <!-- Swoosh scaled 0.3516: 210→94, 715→271, 470→185, 800→301, 810→305, 590→228, stroke 46*.3516=16 -->
    <path d="M 94 271 Q 185 301 305 228"
          stroke="#FFFFFF"
          stroke-width="16"
          stroke-linecap="round"
          fill="none"
          stroke-opacity="0.92"/>
    <path d="M 111 296 Q 196 314 284 255"
          stroke="#FFFFFF"
          stroke-width="8"
          stroke-linecap="round"
          fill="none"
          stroke-opacity="0.42"/>

    <!-- Plane at centre (200, 195.8) rotated -30, scaled 0.3516.
         Original offset-from-centre points scaled:
           (-210,150)  → (-74,53)
           (275,-170)  → (97,-60)
           (105,35)    → (37,12)
           (180,215)   → (63,76)
           (45,215)    → (16,76) -->
    <g transform="translate(200 196) rotate(-30)">
      <path d="M -74 53 L 97 -60 L 37 12 Z" fill="#FFFFFF"/>
      <path d="M 37 12 L 97 -60 L 63 76 Z"  fill="#E8EEFF"/>
      <path d="M -74 53 L 37 12 L 16 76 Z"  fill="#C7D5F5"/>
    </g>
  </g>

  <!-- Wordmark "Jetmeaway" in bold italic dark navy -->
  <text x="430"
        y="260"
        font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif"
        font-size="220"
        font-weight="900"
        font-style="italic"
        letter-spacing="-4"
        fill="#0A1628">Jetmeaway</text>
</svg>
