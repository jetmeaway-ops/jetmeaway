<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    JetMeAway canonical ADAPTIVE FOREGROUND — 2026-04-21.
    For Android adaptive icons.

    Design rule recap: adaptive foreground layers are 108×108 dp, but
    ONLY the inner 66% safe zone (centred 72×72 dp) is guaranteed visible
    on every device mask (circle / squircle / rounded-square). The outer
    strip is clipped away by different masks on different OEMs.

    Our approach:
      • Fill the WHOLE canvas with the two-tone (gold left / blue right).
        Outside the mask, those fills get cropped — which is exactly what
        Android's adaptive icon system is designed for.
      • Keep the airliner silhouette and swoosh constrained inside the
        inner 66% safe zone (x,y ∈ [174, 850]). Math in icon-canonical.svg
        already put them inside that zone at full canvas scale, so we keep
        the same coordinates here — no scaling needed.

    Net result: circular-mask launcher shows a full two-tone circle with
    the airliner — visually identical to the 512×512 hi-res store icon.
    Squircle/rounded-square launchers show the same art with slightly
    different corners, still unambiguously the same brand.

    app.json adaptiveIcon.backgroundColor stays #1458B5 as a safety
    fallback if a launcher ever renders only the background layer; it
    matches the dominant blue half so the mark is still legible.

    DO NOT REGENERATE from any other source. Single master for:
      • mobile/assets/images/adaptive-icon.png (1024×1024)
    See mobile/MOBILE_LOG.md.
  -->
  <defs>
    <linearGradient id="blue-grad-fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1F6BD2"/>
      <stop offset="55%"  stop-color="#1458B5"/>
      <stop offset="100%" stop-color="#0A3B8A"/>
    </linearGradient>

    <linearGradient id="gold-grad-fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FCD15A"/>
      <stop offset="55%"  stop-color="#F5B820"/>
      <stop offset="100%" stop-color="#D99A0E"/>
    </linearGradient>

    <radialGradient id="sheen-fg" cx="0.28" cy="0.22" r="0.7">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="plane-shadow-fg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full-canvas two-tone fill. Android's adaptive mask crops the outer edges. -->
  <!-- Blue base -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#blue-grad-fg)"/>
  <!-- Gold left polygon with slight angle (matches icon-canonical.svg geometry) -->
  <polygon points="0,0 430,0 370,1024 0,1024" fill="url(#gold-grad-fg)"/>
  <!-- Sheen overlay for subtle top-left lift -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#sheen-fg)"/>

  <!-- Swoosh tail beneath the plane (inside inner 66% safe zone [174..850]) -->
  <path d="M 210 715 Q 470 800 810 590"
        stroke="#FFFFFF"
        stroke-width="46"
        stroke-linecap="round"
        fill="none"
        stroke-opacity="0.92"/>
  <path d="M 260 785 Q 500 835 750 670"
        stroke="#FFFFFF"
        stroke-width="22"
        stroke-linecap="round"
        fill="none"
        stroke-opacity="0.42"/>

  <!-- Airliner silhouette — same geometry as icon-canonical.svg, bounded within safe zone -->
  <g transform="translate(600 490) rotate(-25)" filter="url(#plane-shadow-fg)">
    <path d="M 260 0
             C 220 -8 150 -14 60 -18
             L -40 -200
             L -110 -200
             L -70 -28
             C -120 -22 -160 -18 -185 -18
             L -220 -85
             L -260 -85
             L -245 -10
             C -258 -6 -262 -2 -262 0
             C -262 2 -258 6 -245 10
             L -260 85
             L -220 85
             L -185 18
             C -160 18 -120 22 -70 28
             L -110 200
             L -40 200
             L 60 18
             C 150 14 220 8 260 0 Z"
          fill="#FFFFFF"/>
    <path d="M -70 28 L -110 200 L -40 200 L 60 18 Z"
          fill="#D9E2F5" fill-opacity="0.55"/>
  </g>
</svg>
