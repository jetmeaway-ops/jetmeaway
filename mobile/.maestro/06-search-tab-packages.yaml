# Smoke: Search tab → Packages tile → fill form → tap Search →
# assert WebView lands on /packages with origin + destination present.

appId: uk.co.jetmeaway.app
---
- launchApp:
    clearState: false

- tapOn: "Search"
- extendedWaitUntil:
    visible: "FIND YOUR TRIP"
    timeout: 10000

- tapOn: "Packages"
- extendedWaitUntil:
    visible: "Search packages"
    timeout: 5000

# --- Origin (default UK_ORIGINS first entry) --------------------------------
- assertVisible:
    accessibilityLabel: ".*From.*"

# --- Destination -------------------------------------------------------------
- tapOn: "To"
- assertVisible: "Type any city worldwide"
- inputText: "Tenerife"
- tapOn:
    text: ".*Tenerife.*"
- assertVisible: "Tenerife"

# --- Dates ------------------------------------------------------------------
- tapOn:
    text: "Depart"
    optional: true
- runFlow:
    when:
      visible: "Pick depart"
    commands:
      - tapOn: "20"
- tapOn:
    text: "Return"
    optional: true
- tapOn: "27"
- tapOn:
    text: "Confirm"
    optional: true

# --- Guests -----------------------------------------------------------------
- tapOn:
    accessibilityLabel: ".*Guests.*"
- assertVisible: "Adults"
- tapOn: "Apply"

# --- Submit -----------------------------------------------------------------
- tapOn: "Search packages"

- extendedWaitUntil:
    visible: ".*(Tenerife|Adeje|package|bundle|Expedia|Trip\\.com|Klook).*"
    timeout: 20000
