# Smoke: Profile tab renders + settings rows present + version footer
# visible. Doesn't test sign-in itself (Apple / Google auth are out of
# scope for a smoke; cover those in a dedicated auth flow if needed).

appId: uk.co.jetmeaway.app
---
- launchApp:
    clearState: false

- tapOn: "Profile"
- extendedWaitUntil:
    visible: "YOUR ACCOUNT"
    timeout: 10000

- assertVisible: "Profile"

# Settings rows — all 4 plus Help / About.
- assertVisible: "Account"
- assertVisible: "Notifications"
- assertVisible: "Privacy Shield"
- assertVisible: "Security"
- assertVisible: "Help & Support"
- assertVisible: "About"

# Destructive control should be visible (don't tap).
- assertVisible: "Delete Account"

# Version footer — guards against the build-number wiring breaking.
- scrollUntilVisible:
    element:
      text: ".*JetMeAway.*1\\.2\\.2.*"
    timeout: 5000
