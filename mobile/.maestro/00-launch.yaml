# Smoke: app launches and lands on a tab (or onboarding for first launch).
# Catches: blank-screen / crash / wrong initial route regressions.

appId: uk.co.jetmeaway.app
---
- launchApp:
    clearState: false  # respect existing onboarded state; 01-onboarding tests the fresh path
- extendedWaitUntil:
    visible:
      text: ".*(Discover|JetMeAway|Get Started|Travel, decoded).*"
    timeout: 15000
