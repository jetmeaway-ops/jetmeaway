# Maestro workspace config. Used by `maestro test .maestro/` and by
# Maestro Cloud uploads. Lists the flows in run order — earliest
# failures stop the run by default, so put fast/load-bearing flows
# first (launch, onboarding) and tab-level flows after.

flows:
  - 00-launch.yaml
  - 01-onboarding.yaml
  - 02-discover-tab.yaml
  - 03-search-tab-hotels.yaml
  - 04-search-tab-flights.yaml
  - 05-search-tab-cars.yaml
  - 06-search-tab-packages.yaml
  - 07-search-tab-esim.yaml
  - 08-search-tab-insurance.yaml
  - 09-trips-tab.yaml
  - 10-profile-tab.yaml
