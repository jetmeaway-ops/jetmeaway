# Smoke: fresh-install onboarding path. Clears MMKV so the
# `jma:onboarded:v1` flag is wiped and the welcome screen actually shows.
#
# Walks: Welcome → Location permission → Notifications permission → Sign In skip
# Asserts: each step's heading is visible, lands on Discover at the end.
#
# Permission prompts are auto-handled by Maestro (auto-grants OR denies
# based on system defaults). If you want to test the deny path, use
# `runFlow` with a permission override.

appId: uk.co.jetmeaway.app
---
- launchApp:
    clearState: true
    permissions:
      all: deny  # so we get every prompt and can dismiss with Skip/Continue

# Welcome
- extendedWaitUntil:
    visible: "Travel, decoded."
    timeout: 10000
- assertVisible: "WELCOME TO JETMEAWAY"
- assertVisible: "Get Started"
- tapOn: "Get Started"

# Location
- extendedWaitUntil:
    visible: "Find your nearest airport, instantly."
    timeout: 5000
- assertVisible: "STEP 2 OF 4"
- tapOn: "Continue"

# Notifications
- extendedWaitUntil:
    visible: "Catch price drops the moment they happen."
    timeout: 5000
- assertVisible: "STEP 3 OF 4"
- tapOn: "Continue"

# Sign In — skip path
- extendedWaitUntil:
    visible: "Sign in to save trips across devices."
    timeout: 5000
- assertVisible: "STEP 4 OF 4"
- tapOn: "Skip for now"

# Lands on Discover
- extendedWaitUntil:
    visible: "Discover"
    timeout: 10000
- assertVisible: "WHERE NEXT?"
