<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" width="1600" height="800" role="img" aria-label="JetMeAway Scout app mockup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1230"/>
      <stop offset="55%" stop-color="#0F1B4A"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.1" r="0.9">
      <stop offset="0%" stop-color="#3A7BFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0A1230" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="800" fill="url(#bg)"/>
  <rect width="1600" height="800" fill="url(#glow)"/>

  <!-- Abstract map grid (city streets) -->
  <g stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 120 L1600 120"/>
    <path d="M0 260 L1600 260"/>
    <path d="M0 400 L1600 400"/>
    <path d="M0 540 L1600 540"/>
    <path d="M0 680 L1600 680"/>
    <path d="M140 0 L140 800"/>
    <path d="M320 0 L320 800"/>
    <path d="M500 0 L500 800"/>
    <path d="M680 0 L680 800"/>
    <path d="M860 0 L860 800"/>
    <path d="M1040 0 L1040 800"/>
    <path d="M1220 0 L1220 800"/>
    <path d="M1400 0 L1400 800"/>
  </g>

  <!-- Diagonal "main road" -->
  <path d="M-50 620 Q 400 400 900 380 T 1700 220" stroke="#3A7BFF" stroke-opacity="0.35" stroke-width="4" fill="none"/>
  <path d="M-50 620 Q 400 400 900 380 T 1700 220" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="6 8" fill="none"/>

  <!-- Pins on the map -->
  <g>
    <circle cx="260" cy="520" r="6" fill="#00D0A4"/>
    <circle cx="260" cy="520" r="16" fill="#00D0A4" fill-opacity="0.25"/>
    <circle cx="560" cy="410" r="6" fill="#FFB547"/>
    <circle cx="560" cy="410" r="16" fill="#FFB547" fill-opacity="0.25"/>
    <circle cx="420" cy="180" r="6" fill="#FF5470"/>
    <circle cx="420" cy="180" r="16" fill="#FF5470" fill-opacity="0.25"/>
    <circle cx="780" cy="640" r="6" fill="#3A7BFF"/>
    <circle cx="780" cy="640" r="16" fill="#3A7BFF" fill-opacity="0.25"/>
  </g>

  <!-- Left: Headline -->
  <g font-family="Poppins, system-ui, sans-serif" fill="#FFFFFF">
    <text x="100" y="240" font-size="28" font-weight="700" fill="#7FB2FF" letter-spacing="4">JETMEAWAY · SCOUT</text>
    <text x="100" y="340" font-size="76" font-weight="900" letter-spacing="-2">Life, not just</text>
    <text x="100" y="420" font-size="76" font-weight="900" letter-spacing="-2" fill="#7FB2FF">lodging.</text>
    <text x="100" y="490" font-size="24" font-weight="600" fill="#C7D5F5" opacity="0.9">Your personal travel scout — mapping</text>
    <text x="100" y="524" font-size="24" font-weight="600" fill="#C7D5F5" opacity="0.9">the 24-hour ecosystem around your stay.</text>

    <!-- Android badge -->
    <g transform="translate(100 580)">
      <rect width="220" height="64" rx="14" fill="#FFFFFF"/>
      <text x="28" y="28" font-size="11" font-weight="700" fill="#1A1D2B" letter-spacing="2">NOW ON</text>
      <text x="28" y="50" font-size="20" font-weight="900" fill="#1A1D2B">Google Play</text>
    </g>
    <g transform="translate(340 580)">
      <rect width="220" height="64" rx="14" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.3"/>
      <text x="28" y="28" font-size="11" font-weight="700" fill="#C7D5F5" letter-spacing="2">COMING SOON</text>
      <text x="28" y="50" font-size="20" font-weight="900" fill="#FFFFFF">App Store</text>
    </g>
  </g>

  <!-- Phone mockup (right) -->
  <g transform="translate(1040 90)">
    <!-- shadow -->
    <rect x="-10" y="20" width="420" height="640" rx="52" fill="#000000" fill-opacity="0.35" filter="url(#soft)"/>
    <!-- body -->
    <rect x="0" y="0" width="420" height="640" rx="48" fill="#0F1119"/>
    <rect x="10" y="10" width="400" height="620" rx="42" fill="url(#card)"/>

    <!-- notch -->
    <rect x="170" y="18" width="80" height="14" rx="7" fill="#0F1119"/>

    <!-- header -->
    <text x="32" y="74" font-family="Poppins" font-size="11" font-weight="700" fill="#0066FF" letter-spacing="2">SCOUT · LISBON</text>
    <text x="32" y="104" font-family="Poppins" font-size="24" font-weight="900" fill="#1A1D2B">Príncipe Real</text>
    <text x="32" y="126" font-family="Poppins" font-size="12" font-weight="600" fill="#8E95A9">Fit score · 94 / 100</text>

    <!-- Card 1: Morning ritual -->
    <g transform="translate(24 150)">
      <rect width="372" height="86" rx="16" fill="#F8FAFC" stroke="#E8ECF4"/>
      <circle cx="30" cy="42" r="18" fill="#FFE8D1"/>
      <text x="30" y="48" font-family="system-ui" font-size="20" font-weight="900" text-anchor="middle" fill="#E07A00">☕</text>
      <text x="64" y="36" font-family="Poppins" font-size="11" font-weight="700" fill="#0066FF" letter-spacing="1.5">MORNING RITUAL</text>
      <text x="64" y="58" font-family="Poppins" font-size="15" font-weight="800" fill="#1A1D2B">Hello, Kristof · opens 06:30</text>
      <text x="64" y="74" font-family="Poppins" font-size="11" font-weight="600" fill="#8E95A9">Artisan roaster · 3 min walk</text>
    </g>

    <!-- Card 2: Fitness -->
    <g transform="translate(24 250)">
      <rect width="372" height="86" rx="16" fill="#F8FAFC" stroke="#E8ECF4"/>
      <circle cx="30" cy="42" r="18" fill="#D8F3E4"/>
      <text x="30" y="49" font-family="system-ui" font-size="20" font-weight="900" text-anchor="middle" fill="#00A86B">▲</text>
      <text x="64" y="36" font-family="Poppins" font-size="11" font-weight="700" fill="#00A86B" letter-spacing="1.5">FITNESS ECOSYSTEM</text>
      <text x="64" y="58" font-family="Poppins" font-size="15" font-weight="800" fill="#1A1D2B">CrossFit LX · 4 min walk</text>
      <text x="64" y="74" font-family="Poppins" font-size="11" font-weight="600" fill="#8E95A9">Yoga · Lap pool · Cold plunge</text>
    </g>

    <!-- Card 3: Wellness -->
    <g transform="translate(24 350)">
      <rect width="372" height="86" rx="16" fill="#F8FAFC" stroke="#E8ECF4"/>
      <circle cx="30" cy="42" r="18" fill="#E4E8FF"/>
      <text x="30" y="49" font-family="system-ui" font-size="20" font-weight="900" text-anchor="middle" fill="#3A7BFF">◆</text>
      <text x="64" y="36" font-family="Poppins" font-size="11" font-weight="700" fill="#3A7BFF" letter-spacing="1.5">WELLNESS LAYER</text>
      <text x="64" y="58" font-family="Poppins" font-size="15" font-weight="800" fill="#1A1D2B">Mercado Biológico · 2 min</text>
      <text x="64" y="74" font-family="Poppins" font-size="11" font-weight="600" fill="#8E95A9">Organic grocer · Quiet park</text>
    </g>

    <!-- Privacy shield footer -->
    <g transform="translate(24 460)">
      <rect width="372" height="64" rx="16" fill="#0F1119"/>
      <text x="24" y="28" font-family="Poppins" font-size="11" font-weight="700" fill="#7FB2FF" letter-spacing="1.5">🛡  PRIVACY SHIELD</text>
      <text x="24" y="50" font-family="Poppins" font-size="12" font-weight="700" fill="#FFFFFF">Your rituals stay yours. No resale. Ever.</text>
    </g>

    <!-- CTA -->
    <g transform="translate(24 544)">
      <rect width="372" height="52" rx="14" fill="#0066FF"/>
      <text x="186" y="33" font-family="Poppins" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle">Book this neighbourhood →</text>
    </g>
  </g>
</svg>
